services:
  qvault-postgres:
    image: pgvector/pgvector:pg16
    container_name: qvault-pg
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-qvault}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
      POSTGRES_DB: ${PG_DB:-qvault}
    volumes:
      - ${DATA_DIR:-/mnt/db/qvault}/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PG_USER:-qvault}"]
      interval: 5s
      timeout: 3s
      retries: 5
