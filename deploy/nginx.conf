server {
    listen 80;
    server_name your-server-name;

    client_max_body_size 100m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── oauth2-proxy endpoints ──
    location /oauth2/ {
        proxy_pass http://127.0.0.1:__OAUTH2_PROXY_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Internal auth_request target (not exposed to clients)
    location = /oauth2/auth {
        internal;
        proxy_pass http://127.0.0.1:__OAUTH2_PROXY_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Length "";
        proxy_pass_request_body off;
    }

    # ── All routes: auth_request → app ──
    location / {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in?rd=$request_uri;

        # 從 oauth2-proxy 回傳的 header 取得 access token
        auth_request_set $auth_token $upstream_http_x_auth_request_access_token;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $auth_token";

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
