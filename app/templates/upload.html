{% extends "base.html" %}
{% block title %}上傳周報 — FA Insight Harvester{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">上傳周報</h1>

<div class="max-w-2xl">
    <form id="uploadForm" class="bg-white rounded-lg shadow p-6 space-y-6">
        <!-- Week selection -->
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">年度</label>
                <input type="number" id="year" name="year" value="{{ now().year if now else 2026 }}"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">第幾周</label>
                <input type="number" id="week_number" name="week_number" min="1" max="53"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
        </div>

        <!-- File upload -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">周報檔案 (.pptx)</label>
            <div id="dropZone"
                class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-400 transition-colors cursor-pointer">
                <p class="text-gray-500" id="dropText">拖放 .pptx 檔案到這裡，或點擊選擇檔案</p>
                <input type="file" id="fileInput" name="file" accept=".pptx" class="hidden">
            </div>
        </div>

        <button type="submit" id="submitBtn"
            class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 font-medium disabled:bg-gray-400 disabled:cursor-not-allowed"
            disabled>
            上傳並開始處理
        </button>
    </form>

    <!-- Progress section (hidden initially) -->
    <div id="progressSection" class="hidden mt-6 bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-medium text-gray-800 mb-4">處理進度</h2>
        <div id="progressMessages" class="space-y-2"></div>
        <div class="mt-4">
            <div class="w-full bg-gray-200 rounded-full h-3">
                <div id="progressBar" class="bg-blue-600 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <p id="progressText" class="text-sm text-gray-500 mt-1"></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const dropText = document.getElementById('dropText');
    const submitBtn = document.getElementById('submitBtn');
    const uploadForm = document.getElementById('uploadForm');
    const progressSection = document.getElementById('progressSection');

    // Set default week number to current ISO week
    const now = new Date();
    const startOfYear = new Date(now.getFullYear(), 0, 1);
    const weekNum = Math.ceil(((now - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
    document.getElementById('week_number').value = weekNum;
    document.getElementById('year').value = now.getFullYear();

    // Drag & drop
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('border-blue-400', 'bg-blue-50');
    });
    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('border-blue-400', 'bg-blue-50');
    });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('border-blue-400', 'bg-blue-50');
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            onFileSelected();
        }
    });
    fileInput.addEventListener('change', onFileSelected);

    function onFileSelected() {
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            dropText.textContent = file.name;
            dropZone.classList.add('border-green-400', 'bg-green-50');
            submitBtn.disabled = false;
        }
    }

    // Upload
    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.textContent = '上傳中...';

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        const year = document.getElementById('year').value;
        const week = document.getElementById('week_number').value;

        try {
            const resp = await fetch(`/api/upload?year=${year}&week_number=${week}`, {
                method: 'POST',
                body: formData,
            });
            const data = await resp.json();

            if (!resp.ok) {
                alert('上傳失敗: ' + (data.detail || '未知錯誤'));
                submitBtn.disabled = false;
                submitBtn.textContent = '上傳並開始處理';
                return;
            }

            // Show progress and connect SSE
            progressSection.classList.remove('hidden');
            connectSSE(data.report_id);
        } catch (err) {
            alert('上傳失敗: ' + err.message);
            submitBtn.disabled = false;
            submitBtn.textContent = '上傳並開始處理';
        }
    });

    function connectSSE(reportId) {
        const evtSource = new EventSource(`/api/upload/${reportId}/progress`);
        const messages = document.getElementById('progressMessages');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        evtSource.addEventListener('status', (e) => {
            const data = JSON.parse(e.data);
            addMessage(messages, data.message, 'blue');
        });

        evtSource.addEventListener('prefilter', (e) => {
            const data = JSON.parse(e.data);
            addMessage(messages,
                `預篩選完成: ${data.total_slides} 頁中有 ${data.candidate_count} 頁為候選案例頁`,
                'green'
            );
        });

        evtSource.addEventListener('vlm_progress', (e) => {
            const data = JSON.parse(e.data);
            const pct = Math.round((data.completed / data.total) * 100);
            progressBar.style.width = pct + '%';
            progressText.textContent = `VLM 提取中 ${data.completed}/${data.total} 頁...`;
        });

        evtSource.addEventListener('complete', (e) => {
            const data = JSON.parse(e.data);
            evtSource.close();
            progressBar.style.width = '100%';
            progressBar.classList.remove('bg-blue-600');
            progressBar.classList.add('bg-green-500');
            addMessage(messages,
                `處理完成！共 ${data.case_pages} 個案例頁。`,
                'green'
            );
            // Redirect to review page
            setTimeout(() => {
                window.location.href = `/reports/${data.report_id}/review`;
            }, 1500);
        });

        evtSource.addEventListener('error', (e) => {
            try {
                const data = JSON.parse(e.data);
                addMessage(messages, data.message, 'red');
            } catch {
                addMessage(messages, '處理過程發生錯誤', 'red');
            }
            evtSource.close();
            progressBar.classList.remove('bg-blue-600');
            progressBar.classList.add('bg-red-500');
        });
    }

    function addMessage(container, text, color) {
        const div = document.createElement('div');
        div.className = `text-sm text-${color}-600`;
        div.textContent = text;
        container.appendChild(div);
    }
</script>
{% endblock %}
