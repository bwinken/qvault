{% extends "base.html" %}
{% block title %}案例搜尋 — FA Insight Harvester{% endblock %}

{% block content %}
<!-- Header -->
<div class="mb-10">
    <h1 class="text-[26px] font-bold text-gray-900 tracking-tight">案例搜尋</h1>
    <p class="text-[13px] text-gray-400 mt-1 font-medium">搜尋與篩選所有失效分析案例</p>
</div>

<!-- Search & Filters -->
<div class="card bg-surface-card rounded-2xl p-5 mb-8">
    <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
        <div class="md:col-span-5 relative">
            <span class="material-icons-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300 text-[18px]">search</span>
            <input type="text" id="searchQuery" placeholder="全文搜尋 (客戶、Device、缺陷模式...)"
                class="w-full input-field rounded-xl pl-10 pr-4 py-2.5 text-[13px]">
        </div>
        <div class="md:col-span-3">
            <input type="text" id="filterCustomer" placeholder="客戶篩選"
                class="w-full input-field rounded-xl px-4 py-2.5 text-[13px]">
        </div>
        <div class="md:col-span-2">
            <input type="text" id="filterDevice" placeholder="Device"
                class="w-full input-field rounded-xl px-4 py-2.5 text-[13px]">
        </div>
        <div class="md:col-span-2">
            <button onclick="searchCases()"
                class="w-full bg-gradient-to-r from-accent to-accent-light text-white py-2.5 rounded-xl text-[13px] font-semibold hover:shadow-lg hover:shadow-accent/15 transition-all duration-300 inline-flex items-center justify-center gap-2">
                <span class="material-icons-outlined text-[16px]">search</span>
                搜尋
            </button>
        </div>
    </div>
</div>

<!-- Results -->
<div id="resultsContainer">
    <div class="flex flex-col items-center py-20">
        <div class="w-16 h-16 rounded-2xl bg-surface-muted/60 flex items-center justify-center mb-4">
            <span class="material-icons-outlined text-gray-300 text-[28px]">manage_search</span>
        </div>
        <p class="text-[13px] text-gray-400 font-medium">輸入搜尋條件或直接點擊搜尋查看所有案例</p>
    </div>
</div>

<!-- Pagination -->
<div id="pagination" class="hidden flex items-center justify-between mt-5 px-1">
    <p id="paginationInfo" class="text-[11px] text-gray-400 font-mono font-medium"></p>
    <div class="flex gap-2">
        <button id="prevBtn" onclick="changePage(-1)"
            class="inline-flex items-center gap-1 px-3.5 py-1.5 border border-surface-muted rounded-lg text-[12px] text-gray-500 font-medium hover:bg-surface hover:border-accent/20 transition-all duration-200 disabled:opacity-30" disabled>
            <span class="material-icons-outlined text-[14px]">chevron_left</span>上一頁
        </button>
        <button id="nextBtn" onclick="changePage(1)"
            class="inline-flex items-center gap-1 px-3.5 py-1.5 border border-surface-muted rounded-lg text-[12px] text-gray-500 font-medium hover:bg-surface hover:border-accent/20 transition-all duration-200">
            下一頁<span class="material-icons-outlined text-[14px]">chevron_right</span>
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    const pageSize = 20;

    document.getElementById('searchQuery').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') searchCases();
    });

    async function searchCases() {
        const q = document.getElementById('searchQuery').value.trim();
        const customer = document.getElementById('filterCustomer').value.trim();
        const device = document.getElementById('filterDevice').value.trim();

        const params = new URLSearchParams({ page: currentPage, page_size: pageSize });
        if (q) params.set('q', q);
        if (customer) params.set('customer', customer);
        if (device) params.set('device', device);

        try {
            const resp = await fetch('/api/cases?' + params.toString());
            const data = await resp.json();
            renderResults(data);
        } catch (err) {
            document.getElementById('resultsContainer').innerHTML =
                `<div class="text-center py-16"><p class="text-[13px] text-red-500 font-medium">搜尋失敗: ${err.message}</p></div>`;
        }
    }

    function renderResults(data) {
        const container = document.getElementById('resultsContainer');

        if (data.items.length === 0) {
            container.innerHTML = `
                <div class="flex flex-col items-center py-20">
                    <div class="w-16 h-16 rounded-2xl bg-surface-muted/60 flex items-center justify-center mb-4">
                        <span class="material-icons-outlined text-gray-300 text-[28px]">search_off</span>
                    </div>
                    <p class="text-[13px] text-gray-400 font-medium">未找到符合條件的案例</p>
                </div>`;
            document.getElementById('pagination').classList.add('hidden');
            return;
        }

        let html = '<div class="space-y-2">';
        data.items.forEach((c, i) => {
            const statusMap = {
                'Open': 'bg-amber-50 text-amber-600 border-amber-100',
                'Closed': 'bg-emerald-50 text-emerald-600 border-emerald-100',
            };
            const statusClass = statusMap[c.fa_status] || 'bg-gray-50 text-gray-500 border-gray-100';

            html += `
            <a href="/cases/${c.id}" class="stagger-in card bg-surface-card rounded-xl p-4 flex items-center justify-between group block" style="animation-delay: ${i * 0.03}s">
                <div class="flex items-center gap-4 min-w-0">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-accent/[0.06] to-accent/[0.02] flex items-center justify-center shrink-0">
                        <span class="material-icons-outlined text-accent/50 text-[18px]">bug_report</span>
                    </div>
                    <div class="min-w-0">
                        <div class="text-[13px] font-semibold text-gray-900 group-hover:text-accent transition-colors duration-200 truncate">
                            ${c.customer || '—'} / ${c.device || '—'}
                        </div>
                        <div class="text-[11px] text-gray-400 mt-0.5 truncate font-medium">
                            ${c.defect_mode || '—'} · ${c.model || '—'} · <span class="font-mono">${c.date || '—'}</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-4 shrink-0 ml-4">
                    <span class="text-[11px] text-gray-400 font-mono font-medium">${c.defect_rate_raw || ''}</span>
                    <span class="badge border ${statusClass}">${c.fa_status || '—'}</span>
                    <span class="material-icons-outlined text-gray-200 group-hover:text-accent group-hover:translate-x-0.5 transition-all duration-200 text-[18px]">chevron_right</span>
                </div>
            </a>`;
        });
        html += '</div>';
        container.innerHTML = html;

        // Pagination
        const totalPages = Math.ceil(data.total / pageSize);
        document.getElementById('pagination').classList.remove('hidden');
        document.getElementById('paginationInfo').textContent =
            `${data.total} 筆 · ${data.page}/${totalPages}`;
        document.getElementById('prevBtn').disabled = data.page <= 1;
        document.getElementById('nextBtn').disabled = data.page >= totalPages;
    }

    function changePage(delta) {
        currentPage += delta;
        if (currentPage < 1) currentPage = 1;
        searchCases();
    }

    searchCases();
</script>
{% endblock %}
