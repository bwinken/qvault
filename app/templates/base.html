<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QVault{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js" integrity="sha384-fw+eTlCc7suMV/1w/7fr2/PmwElUIt5i82bi+qTiLXvjRXZ2/FkiTNA/w0MhXnGI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Google Sans', 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #202124;
            line-height: 1.6;
            margin: 0;
        }

        /* ── Top bar (Google Drive style) ── */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 20px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-icon { font-size: 28px; color: #5f6368; }
        .topbar-title {
            font-size: 22px;
            font-weight: 400;
            color: #5f6368;
            letter-spacing: -0.2px;
        }
        .topbar-nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .topbar-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 24px;
            text-decoration: none;
            color: #5f6368;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
        }
        .topbar-link:hover { background: #f1f3f4; color: #202124; }
        .topbar-link.active { background: #e8f0fe; color: #1967d2; }
        .topbar-link .material-icons-outlined { font-size: 20px; }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-user {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #5f6368;
        }
        .topbar-user .material-icons-outlined { font-size: 28px; color: #1a73e8; }
        .topbar-logout {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: #5f6368;
            text-decoration: none;
            transition: background 0.15s;
        }
        .topbar-logout:hover { background: #f1f3f4; }
        .topbar-logout .material-icons-outlined { font-size: 20px; }

        /* ── Container ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* ── Cards ── */
        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 24px;
            transition: box-shadow 0.25s, border-color 0.25s;
        }
        .card:hover {
            box-shadow: 0 2px 12px rgba(32, 33, 36, 0.1);
            border-color: #d2d2d2;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: box-shadow 0.15s, background 0.15s;
        }
        .btn-primary { background: #1a73e8; color: #fff; }
        .btn-primary:hover { background: #1765cc; box-shadow: 0 1px 3px rgba(26,115,232,0.4); }
        .btn-success { background: #1e8e3e; color: #fff; }
        .btn-success:hover { background: #188038; box-shadow: 0 1px 3px rgba(30,142,62,0.4); }
        .btn-outline { background: #fff; border: 1px solid #dadce0; color: #3c4043; }
        .btn-outline:hover { background: #f8f9fa; border-color: #d2d2d2; }
        .btn-danger { background: #d93025; color: #fff; }
        .btn-danger:hover { background: #c5221f; box-shadow: 0 1px 3px rgba(217,48,37,0.4); }

        /* ── Page header ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 22px;
            font-weight: 400;
            color: #202124;
        }
        .page-header-actions { display: flex; gap: 8px; }

        /* ── Tables ── */
        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .data-table th, .data-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        .data-table th {
            background: #f8f9fa;
            font-weight: 500;
            color: #5f6368;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .data-table tr:hover { background: #f8f9fa; }

        /* ── Upload area ── */
        .upload-area {
            border: 2px dashed #dadce0;
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .upload-area:hover { border-color: #1a73e8; background: #f8f9fa; }
        .upload-area.dragover { border-color: #1a73e8; background: #e8f0fe; }

        /* ── Alerts ── */
        .alert { padding: 14px 20px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .alert-info { background: #e8f0fe; color: #1967d2; border: 1px solid #d2e3fc; }
        .alert-warning { background: #fef7e0; color: #ea8600; border: 1px solid #feefc3; }
        .alert-error { background: #fce8e6; color: #c5221f; border: 1px solid #fad2cf; }
        .alert-success { background: #e6f4ea; color: #137333; border: 1px solid #ceead6; }

        /* ── Workflow cards ── */
        .workflow-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 28px;
            transition: box-shadow 0.25s, border-color 0.25s;
            animation: fadeSlideUp 0.4s ease both;
        }
        .workflow-card:hover {
            box-shadow: 0 2px 12px rgba(32, 33, 36, 0.1);
            border-color: #d2d2d2;
        }
        .workflow-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .workflow-header h2 {
            font-size: 18px;
            font-weight: 500;
            color: #202124;
            margin-bottom: 2px;
        }
        .workflow-header p { font-size: 13px; color: #5f6368; }
        .workflow-icon {
            flex-shrink: 0;
            width: 48px; height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .workflow-icon .material-icons-outlined { font-size: 26px; color: #fff; }
        .workflow-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .workflow-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
        }
        .workflow-btn:active { transform: scale(0.97); }
        .workflow-btn .material-icons-outlined { font-size: 18px; }
        .workflow-btn--primary-blue { background: #e8f0fe; color: #1967d2; }
        .workflow-btn--primary-blue:hover { background: #d2e3fc; }
        .workflow-btn--primary-green { background: #e6f4ea; color: #137333; }
        .workflow-btn--primary-green:hover { background: #ceead6; }
        .workflow-btn--secondary { background: #f1f3f4; color: #3c4043; }
        .workflow-btn--secondary:hover { background: #e8eaed; }
        .workflow-btn--ghost { background: transparent; color: #5f6368; }
        .workflow-btn--ghost:hover { background: #f1f3f4; }

        /* ── Value cards ── */
        .value-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .value-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            padding: 24px;
            transition: box-shadow 0.25s;
        }
        .value-card:hover { box-shadow: 0 2px 12px rgba(32, 33, 36, 0.08); }

        /* ── Section title ── */
        .section-title {
            font-size: 14px;
            font-weight: 500;
            color: #80868b;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
        }

        /* ── Entrance animation ── */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Staggered animation (for grids) ── */
        .stagger-in { animation: fadeSlideUp 0.4s ease both; }
        .stagger-in:nth-child(1) { animation-delay: 0.02s; }
        .stagger-in:nth-child(2) { animation-delay: 0.06s; }
        .stagger-in:nth-child(3) { animation-delay: 0.10s; }
        .stagger-in:nth-child(4) { animation-delay: 0.14s; }
        .stagger-in:nth-child(5) { animation-delay: 0.18s; }
        .stagger-in:nth-child(6) { animation-delay: 0.22s; }
        .stagger-in:nth-child(7) { animation-delay: 0.26s; }
        .stagger-in:nth-child(8) { animation-delay: 0.30s; }
        .stagger-in:nth-child(9) { animation-delay: 0.34s; }
        .stagger-in:nth-child(10) { animation-delay: 0.38s; }

        /* ── Spinner ── */
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #e0e0e0;
            border-top-color: #1a73e8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            z-index: 200;
        }
        .modal-card {
            background: #fff;
            border-radius: 14px;
            padding: 28px 32px;
            width: 480px;
            max-width: 90vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        /* ── Badge ── */
        .badge {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.03em;
            padding: 3px 10px;
            border-radius: 9999px;
        }

        /* ── Input field ── */
        .input-field {
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            border: 1px solid #dadce0;
            border-radius: 8px;
            background: #fff;
            font-family: inherit;
            font-size: 14px;
            padding: 8px 12px;
        }
        .input-field:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
            outline: none;
        }

        /* ── Glow dot ── */
        .glow-dot { box-shadow: 0 0 5px currentColor, 0 0 10px currentColor; }

        /* ── Data value ── */
        .data-value { font-weight: 500; }

        /* ── Delete icon button ── */
        .btn-icon-delete {
            display: flex; align-items: center; justify-content: center;
            width: 32px; height: 32px;
            border-radius: 50%; border: none;
            background: transparent; color: #5f6368;
            cursor: pointer; transition: background 0.15s, color 0.15s;
        }
        .btn-icon-delete:hover { background: #fce8e6; color: #d93025; }
        .btn-icon-delete .material-icons-outlined { font-size: 18px; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #bdc1c6; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .topbar-nav { display: none; }
            .value-cards { grid-template-columns: 1fr; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <span class="material-icons-outlined topbar-icon">science</span>
            <span class="topbar-title">QVault</span>
        </div>
        <nav class="topbar-nav">
            <a href="/" class="topbar-link {% if request.url.path == '/' %}active{% endif %}">
                <span class="material-icons-outlined">home</span> 首頁
            </a>
            {% if "write" in scopes|default([]) %}
            <a href="/upload" class="topbar-link {% if request.url.path == '/upload' %}active{% endif %}">
                <span class="material-icons-outlined">cloud_upload</span> 上傳周報
            </a>
            {% endif %}
            <a href="/weeks" class="topbar-link {% if request.url.path.startswith('/weeks') %}active{% endif %}">
                <span class="material-icons-outlined">folder</span> 週報總覽
            </a>
            <a href="/cases" class="topbar-link {% if request.url.path.startswith('/cases') %}active{% endif %}">
                <span class="material-icons-outlined">table_chart</span> 案例管理
            </a>
        </nav>
        <div class="topbar-right">
            {% if user %}
            <span class="topbar-user">
                <span class="material-icons-outlined">account_circle</span>
                {{ user.employee_name }}
            </span>
            <a href="/auth/logout" class="topbar-logout" title="登出">
                <span class="material-icons-outlined">logout</span>
            </a>
            {% endif %}
        </div>
    </header>

    <main class="container" style="{% block container_style %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
