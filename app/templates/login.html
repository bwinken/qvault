<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 — FA Insight Harvester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Outfit', system-ui, sans-serif; }

        .login-card {
            animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            padding: 0 24px;
            border-radius: 9999px;
            background: #6366f1;
            font-weight: 500;
            font-size: 0.875rem;
            letter-spacing: 0.01em;
            transition: background 0.2s ease;
        }
        .login-btn:hover {
            background: #818cf8;
        }
        .login-btn:active {
            background: #4f46e5;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen" style="background-color: #0e0e1a">

    <div class="login-card w-full max-w-[380px] mx-4 text-center">
        <!-- Logo -->
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-[#6366f1] to-[#818cf8] mb-5">
            <span class="material-icons-outlined text-white text-[24px]">insights</span>
        </div>

        <!-- Title -->
        <h1 class="text-[1.75rem] font-semibold text-white tracking-tight">FA Insight Harvester</h1>
        <p class="text-[0.875rem] text-white/30 mt-1.5 mb-10">Failure Analysis Platform</p>

        <!-- Card -->
        <div class="rounded-2xl border border-white/[0.08] bg-white/[0.03] px-8 py-8">
            <p class="text-[0.9375rem] text-white/45 leading-relaxed mb-8">
                從周報投影片中自動擷取 FA 案例資料，<br>建構可搜尋的知識庫。
            </p>

            <a href="/auth/oauth-redirect" class="login-btn text-white gap-2">
                <span class="material-icons-outlined text-[18px]">login</span>
                <span>使用公司帳號登入</span>
            </a>
        </div>

        <!-- Footer -->
        <p class="text-[0.6875rem] text-white/10 mt-12">Internal Use Only</p>
    </div>

</body>
</html>
