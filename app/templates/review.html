{% extends "base.html" %}
{% block title %}審核周報 — FA Insight Harvester{% endblock %}

{% block content %}
<!-- Header -->
<div class="flex items-center justify-between mb-8">
    <div>
        <h1 class="text-[26px] font-bold text-gray-900 tracking-tight">審核提取結果</h1>
        <div class="flex items-center gap-2 mt-1.5">
            <span class="material-icons-outlined text-gray-300 text-[14px]">description</span>
            <p class="text-[13px] text-gray-400 font-mono font-medium">{{ report.filename }}</p>
        </div>
    </div>
    <button id="saveAllBtn" onclick="confirmSave()"
        class="inline-flex items-center gap-2 bg-gradient-to-r from-teal to-teal-light text-white px-6 py-2.5 rounded-xl text-[13px] font-semibold hover:shadow-lg hover:shadow-teal/20 transition-all duration-300 disabled:from-gray-200 disabled:to-gray-200 disabled:text-gray-400 disabled:shadow-none hover:-translate-y-0.5 disabled:translate-y-0">
        <span class="material-icons-outlined text-[18px]">check_circle</span>
        確認儲存所有案例
    </button>
</div>

<div id="loading" class="flex flex-col items-center py-28">
    <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-accent/8 to-accent/[0.02] flex items-center justify-center mb-4 border border-accent/[0.06]">
        <span class="material-icons-outlined text-accent text-[24px] animate-spin" style="animation-duration: 2s;">hourglass_top</span>
    </div>
    <p class="text-[13px] text-gray-400 font-medium">載入提取結果中...</p>
</div>

<div id="slidesContainer" class="hidden space-y-4"></div>
{% endblock %}

{% block scripts %}
<script>
    const reportId = {{ report.id }};
    let extractionResults = [];

    async function loadResults() {
        try {
            const resp = await fetch(`/api/upload/${reportId}/results`);
            if (!resp.ok) {
                document.getElementById('loading').innerHTML =
                    '<p class="text-[13px] text-red-500 font-medium">載入失敗，請稍後再試</p>';
                return;
            }
            const data = await resp.json();
            extractionResults = data.slides;
            renderSlides();
        } catch (err) {
            document.getElementById('loading').innerHTML =
                `<p class="text-[13px] text-red-500 font-medium">載入失敗: ${err.message}</p>`;
        }
    }

    function renderSlides() {
        document.getElementById('loading').classList.add('hidden');
        const container = document.getElementById('slidesContainer');
        container.classList.remove('hidden');

        const casePages = extractionResults.filter(s => s.is_case_page);
        const errorPages = extractionResults.filter(s => s.error && !s.skipped);
        const otherPages = extractionResults.filter(s => !s.is_case_page && !s.error && s.skipped);

        if (casePages.length > 0) {
            const header = document.createElement('div');
            header.className = 'flex items-center gap-2.5 mb-3';
            header.innerHTML = `
                <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-teal/10 to-teal/[0.04] flex items-center justify-center">
                    <span class="material-icons-outlined text-teal text-[15px]">check_circle</span>
                </div>
                <h2 class="text-[14px] font-semibold text-gray-700">案例頁 <span class="font-mono text-gray-400">(${casePages.length})</span></h2>`;
            container.appendChild(header);
            casePages.forEach((slide, i) => {
                const card = createCaseCard(slide);
                card.style.animationDelay = `${i * 0.04}s`;
                card.classList.add('stagger-in');
                container.appendChild(card);
            });
        }

        if (errorPages.length > 0) {
            const header = document.createElement('div');
            header.className = 'flex items-center gap-2.5 mt-10 mb-3';
            header.innerHTML = `
                <div class="w-7 h-7 rounded-lg bg-red-50 flex items-center justify-center">
                    <span class="material-icons-outlined text-red-400 text-[15px]">error</span>
                </div>
                <h2 class="text-[14px] font-semibold text-red-500">提取失敗 <span class="font-mono text-red-300">(${errorPages.length})</span></h2>`;
            container.appendChild(header);

            errorPages.forEach(slide => {
                const card = document.createElement('div');
                card.className = 'card bg-red-50/40 border-red-100 rounded-xl p-4 flex items-center justify-between';
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="material-icons-outlined text-red-300 text-[18px]">image</span>
                        <span class="text-[13px] font-semibold text-gray-700">Slide <span class="font-mono">${slide.slide_number}</span></span>
                    </div>
                    <span class="text-[11px] text-red-400 font-mono font-medium">${slide.error}</span>`;
                container.appendChild(card);
            });
        }

        if (otherPages.length > 0) {
            const collapsible = document.createElement('details');
            collapsible.className = 'mt-10 card bg-surface-card rounded-xl';
            collapsible.innerHTML = `
                <summary class="px-5 py-3 text-[12px] text-gray-400 cursor-pointer hover:text-gray-600 transition-colors duration-200 flex items-center gap-2 font-medium select-none">
                    <span class="material-icons-outlined text-[14px]">expand_more</span>
                    跳過的頁面 <span class="font-mono">(${otherPages.length})</span>
                </summary>
                <div class="px-5 pb-4 text-[11px] text-gray-300 font-mono font-medium">
                    ${otherPages.map(s => 'Slide ' + s.slide_number).join(', ')}
                </div>`;
            container.appendChild(collapsible);
        }
    }

    function createCaseCard(slide) {
        const card = document.createElement('div');
        card.className = 'card bg-surface-card rounded-2xl p-5';
        card.dataset.slideNumber = slide.slide_number;

        const fields = slide.data || {};
        const fieldDefs = [
            ['date', 'Date', 'event'],
            ['customer', 'Customer', 'business'],
            ['device', 'Device', 'memory'],
            ['model', 'Model', 'label'],
            ['defect_mode', 'Defect Mode', 'report_problem'],
            ['defect_rate_raw', 'Defect Rate', 'percent'],
            ['defect_lots', 'Defect Lots', 'inventory'],
            ['fab_assembly', 'FAB/Assembly', 'factory'],
            ['fa_status', 'FA Status', 'flag'],
            ['follow_up', 'Follow Up', 'update'],
        ];

        let fieldsHtml = fieldDefs.map(([key, label, icon]) => {
            const value = key === 'defect_lots'
                ? (Array.isArray(fields[key]) ? fields[key].join(', ') : (fields[key] || ''))
                : (fields[key] || fields[key.replace('_raw', '')] || '');
            return `
                <div class="flex items-center gap-2.5 py-1.5 group/f">
                    <span class="material-icons-outlined text-gray-300 text-[14px] group-hover/f:text-accent/40 transition-colors">${icon}</span>
                    <span class="w-24 text-[10px] font-bold text-gray-400 uppercase tracking-wider shrink-0 font-mono">${label}</span>
                    <input type="text" data-field="${key}" value="${escapeHtml(value)}"
                        class="flex-1 text-[13px] border-b border-transparent hover:border-gray-200 focus:border-accent focus:outline-none px-1.5 py-0.5 transition-all duration-200 bg-transparent font-medium">
                </div>`;
        }).join('');

        card.innerHTML = `
            <div class="flex gap-5">
                <div class="w-60 shrink-0">
                    <div class="relative overflow-hidden rounded-xl group/img">
                        <img src="/uploads/${slide.image_path}" alt="Slide ${slide.slide_number}"
                            class="w-full rounded-xl border border-surface-muted cursor-pointer transition-transform duration-300 group-hover/img:scale-[1.02]"
                            onclick="window.open('/uploads/${slide.image_path}', '_blank')">
                    </div>
                    <p class="text-[10px] text-gray-300 mt-2 text-center font-mono font-medium">Slide ${slide.slide_number}</p>
                </div>
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="w-2 h-2 rounded-full bg-teal glow-dot" style="color: #2dd4bf;"></span>
                        <span class="text-[11px] font-bold text-teal uppercase tracking-wider">案例頁</span>
                    </div>
                    ${fieldsHtml}
                </div>
            </div>`;

        return card;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async function confirmSave() {
        const btn = document.getElementById('saveAllBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="material-icons-outlined text-[18px] animate-spin">refresh</span>儲存中...';

        const cards = document.querySelectorAll('[data-slide-number]');
        const cases = [];

        cards.forEach(card => {
            const slideNum = parseInt(card.dataset.slideNumber);
            const slide = extractionResults.find(s => s.slide_number === slideNum);
            if (!slide || !slide.is_case_page) return;

            const caseData = {
                slide_number: slideNum,
                image_path: slide.image_path,
                raw_vlm_response: slide.raw_vlm_response || null,
            };

            card.querySelectorAll('input[data-field]').forEach(input => {
                const field = input.dataset.field;
                let value = input.value.trim();
                if (field === 'defect_lots') {
                    caseData[field] = value ? value.split(',').map(s => s.trim()) : [];
                } else {
                    caseData[field] = value || null;
                }
            });

            cases.push(caseData);
        });

        if (cases.length === 0) {
            alert('沒有案例可儲存');
            btn.disabled = false;
            btn.innerHTML = '<span class="material-icons-outlined text-[18px]">check_circle</span>確認儲存所有案例';
            return;
        }

        try {
            const resp = await fetch(`/api/reports/${reportId}/confirm`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cases),
            });

            if (!resp.ok) {
                const err = await resp.json();
                alert('儲存失敗: ' + (err.detail || '未知錯誤'));
                btn.disabled = false;
                btn.innerHTML = '<span class="material-icons-outlined text-[18px]">check_circle</span>確認儲存所有案例';
                return;
            }

            const data = await resp.json();
            alert(`已儲存 ${data.case_count} 個案例！`);
            window.location.href = '/';
        } catch (err) {
            alert('儲存失敗: ' + err.message);
            btn.disabled = false;
            btn.innerHTML = '<span class="material-icons-outlined text-[18px]">check_circle</span>確認儲存所有案例';
        }
    }

    loadResults();
</script>
{% endblock %}
