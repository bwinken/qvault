{% extends "base.html" %}
{% block title %}審核周報 — FA Insight Harvester{% endblock %}

{% block content %}
<!-- Header -->
<div class="flex items-center justify-between mb-8">
    <div>
        <h1 class="text-2xl font-semibold text-gray-900 tracking-tight">審核提取結果</h1>
        <div class="flex items-center gap-2 mt-1">
            <span class="material-icons-outlined text-gray-300 text-sm">description</span>
            <p class="text-sm text-gray-400">{{ report.filename }}</p>
        </div>
    </div>
    <button id="saveAllBtn" onclick="confirmSave()"
        class="inline-flex items-center gap-2 bg-emerald-500 text-white px-6 py-2.5 rounded-xl text-sm font-medium hover:bg-emerald-600 transition-colors shadow-sm disabled:bg-gray-200 disabled:text-gray-400 disabled:shadow-none">
        <span class="material-icons-outlined text-lg">check_circle</span>
        確認儲存所有案例
    </button>
</div>

<div id="loading" class="flex flex-col items-center py-24">
    <div class="w-12 h-12 rounded-full bg-accent/8 flex items-center justify-center mb-4 animate-pulse">
        <span class="material-icons-outlined text-accent text-2xl">hourglass_top</span>
    </div>
    <p class="text-sm text-gray-400">載入提取結果中...</p>
</div>

<div id="slidesContainer" class="hidden space-y-4"></div>
{% endblock %}

{% block scripts %}
<script>
    const reportId = {{ report.id }};
    let extractionResults = [];

    async function loadResults() {
        try {
            const resp = await fetch(`/api/upload/${reportId}/results`);
            if (!resp.ok) {
                document.getElementById('loading').innerHTML =
                    '<p class="text-sm text-red-500">載入失敗，請稍後再試</p>';
                return;
            }
            const data = await resp.json();
            extractionResults = data.slides;
            renderSlides();
        } catch (err) {
            document.getElementById('loading').innerHTML =
                `<p class="text-sm text-red-500">載入失敗: ${err.message}</p>`;
        }
    }

    function renderSlides() {
        document.getElementById('loading').classList.add('hidden');
        const container = document.getElementById('slidesContainer');
        container.classList.remove('hidden');

        const casePages = extractionResults.filter(s => s.is_case_page);
        const errorPages = extractionResults.filter(s => s.error && !s.skipped);
        const otherPages = extractionResults.filter(s => !s.is_case_page && !s.error && s.skipped);

        if (casePages.length > 0) {
            const header = document.createElement('div');
            header.className = 'flex items-center gap-2 mb-2';
            header.innerHTML = `
                <span class="material-icons-outlined text-emerald-500 text-lg">check_circle</span>
                <h2 class="text-sm font-semibold text-gray-700">案例頁 (${casePages.length})</h2>`;
            container.appendChild(header);
            casePages.forEach(slide => container.appendChild(createCaseCard(slide)));
        }

        if (errorPages.length > 0) {
            const header = document.createElement('div');
            header.className = 'flex items-center gap-2 mt-8 mb-2';
            header.innerHTML = `
                <span class="material-icons-outlined text-red-400 text-lg">error</span>
                <h2 class="text-sm font-semibold text-red-500">提取失敗 (${errorPages.length})</h2>`;
            container.appendChild(header);

            errorPages.forEach(slide => {
                const card = document.createElement('div');
                card.className = 'card bg-red-50/50 border border-red-100 rounded-xl p-4 flex items-center justify-between';
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="material-icons-outlined text-red-300">image</span>
                        <span class="text-sm font-medium text-gray-700">Slide ${slide.slide_number}</span>
                    </div>
                    <span class="text-xs text-red-400">${slide.error}</span>`;
                container.appendChild(card);
            });
        }

        if (otherPages.length > 0) {
            const collapsible = document.createElement('details');
            collapsible.className = 'mt-8 card bg-surface-card rounded-xl border border-surface-muted';
            collapsible.innerHTML = `
                <summary class="px-5 py-3 text-xs text-gray-400 cursor-pointer hover:text-gray-600 transition-colors flex items-center gap-2">
                    <span class="material-icons-outlined text-sm">expand_more</span>
                    跳過的頁面 (${otherPages.length} 頁)
                </summary>
                <div class="px-5 pb-4 text-xs text-gray-300">
                    ${otherPages.map(s => 'Slide ' + s.slide_number).join(', ')}
                </div>`;
            container.appendChild(collapsible);
        }
    }

    function createCaseCard(slide) {
        const card = document.createElement('div');
        card.className = 'card bg-surface-card rounded-2xl border border-surface-muted p-5';
        card.dataset.slideNumber = slide.slide_number;

        const fields = slide.data || {};
        const fieldDefs = [
            ['date', 'Date', 'event'],
            ['customer', 'Customer', 'business'],
            ['device', 'Device', 'memory'],
            ['model', 'Model', 'label'],
            ['defect_mode', 'Defect Mode', 'report_problem'],
            ['defect_rate_raw', 'Defect Rate', 'percent'],
            ['defect_lots', 'Defect Lots', 'inventory'],
            ['fab_assembly', 'FAB/Assembly', 'factory'],
            ['fa_status', 'FA Status', 'flag'],
            ['follow_up', 'Follow Up', 'update'],
        ];

        let fieldsHtml = fieldDefs.map(([key, label, icon]) => {
            const value = key === 'defect_lots'
                ? (Array.isArray(fields[key]) ? fields[key].join(', ') : (fields[key] || ''))
                : (fields[key] || fields[key.replace('_raw', '')] || '');
            return `
                <div class="flex items-center gap-2 py-1.5">
                    <span class="material-icons-outlined text-gray-300 text-sm">${icon}</span>
                    <span class="w-24 text-[11px] font-medium text-gray-400 uppercase tracking-wider shrink-0">${label}</span>
                    <input type="text" data-field="${key}" value="${escapeHtml(value)}"
                        class="flex-1 text-sm border-b border-transparent hover:border-gray-200 focus:border-accent focus:outline-none px-1 py-0.5 transition-colors bg-transparent">
                </div>`;
        }).join('');

        card.innerHTML = `
            <div class="flex gap-5">
                <div class="w-56 shrink-0">
                    <img src="/uploads/${slide.image_path}" alt="Slide ${slide.slide_number}"
                        class="w-full rounded-xl border border-surface-muted cursor-pointer hover:shadow-lg transition-shadow"
                        onclick="window.open('/uploads/${slide.image_path}', '_blank')">
                    <p class="text-[10px] text-gray-300 mt-1.5 text-center">Slide ${slide.slide_number}</p>
                </div>
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
                        <span class="text-xs font-semibold text-emerald-600">案例頁</span>
                    </div>
                    ${fieldsHtml}
                </div>
            </div>`;

        return card;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async function confirmSave() {
        const btn = document.getElementById('saveAllBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="material-icons-outlined text-lg animate-spin">refresh</span>儲存中...';

        const cards = document.querySelectorAll('[data-slide-number]');
        const cases = [];

        cards.forEach(card => {
            const slideNum = parseInt(card.dataset.slideNumber);
            const slide = extractionResults.find(s => s.slide_number === slideNum);
            if (!slide || !slide.is_case_page) return;

            const caseData = {
                slide_number: slideNum,
                image_path: slide.image_path,
                raw_vlm_response: slide.raw_vlm_response || null,
            };

            card.querySelectorAll('input[data-field]').forEach(input => {
                const field = input.dataset.field;
                let value = input.value.trim();
                if (field === 'defect_lots') {
                    caseData[field] = value ? value.split(',').map(s => s.trim()) : [];
                } else {
                    caseData[field] = value || null;
                }
            });

            cases.push(caseData);
        });

        if (cases.length === 0) {
            alert('沒有案例可儲存');
            btn.disabled = false;
            btn.innerHTML = '<span class="material-icons-outlined text-lg">check_circle</span>確認儲存所有案例';
            return;
        }

        try {
            const resp = await fetch(`/api/reports/${reportId}/confirm`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cases),
            });

            if (!resp.ok) {
                const err = await resp.json();
                alert('儲存失敗: ' + (err.detail || '未知錯誤'));
                btn.disabled = false;
                btn.innerHTML = '<span class="material-icons-outlined text-lg">check_circle</span>確認儲存所有案例';
                return;
            }

            const data = await resp.json();
            alert(`已儲存 ${data.case_count} 個案例！`);
            window.location.href = '/';
        } catch (err) {
            alert('儲存失敗: ' + err.message);
            btn.disabled = false;
            btn.innerHTML = '<span class="material-icons-outlined text-lg">check_circle</span>確認儲存所有案例';
        }
    }

    loadResults();
</script>
{% endblock %}
